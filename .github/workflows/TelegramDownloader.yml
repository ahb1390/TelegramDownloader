name: Download & Split Telegram File

on:
  workflow_dispatch:
    inputs:
      message_link:
        description: 'لینک پیام تلگرام (مثال: https://t.me/pypackeges/456)'
        required: true
        default: 'https://t.me/pypackeges/456'
      split_size:
        description: 'اندازه هر قطعه (مثال: 90M, 100M, 50M)'
        required: true
        default: '90M'

jobs:
  download-and-split:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install telethon

      - name: Download file from Telegram
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          MESSAGE_LINK: ${{ github.event.inputs.message_link }}
        run: |
          python - <<EOF
          import os
          import asyncio
          from telethon import TelegramClient
          from urllib.parse import urlparse
          
          async def download():
              # Parse link
              path = urlparse(os.environ['MESSAGE_LINK']).path
              parts = path.strip('/').split('/')
              if len(parts) < 2:
                  print("Invalid link format")
                  return False
              chat = parts[0]
              msg_id = int(parts[1])
              
              # Connect
              client = TelegramClient('session', int(os.environ['API_ID']), os.environ['API_HASH'])
              await client.start(bot_token=os.environ['BOT_TOKEN'])
              
              # Get message
              entity = await client.get_entity(chat)
              msg = await client.get_messages(entity, ids=msg_id)
              
              if msg and msg.document:
                  # Get original filename
                  fname = msg.file.name if msg.file.name else f"file_{msg_id}.bin"
                  fpath = os.path.join("downloads", fname)
                  os.makedirs("downloads", exist_ok=True)
                  
                  # Download
                  await client.download_media(msg, file=fpath)
                  print(f"Downloaded: {fpath}")
                  return True
              else:
                  print("No document found")
                  return False
          
          success = asyncio.run(download())
          if not success:
              exit(1)
          EOF

      - name: Split file into ${{ github.event.inputs.split_size }} chunks
        run: |
          cd downloads
          # Find the downloaded file (there should be exactly one)
          file=$(ls -1 | head -1)
          echo "Splitting: $file"
          # Split into chunks of specified size (e.g., 90M)
          split -b ${{ github.event.inputs.split_size }} -d "$file" "${file}.part."
          # Remove original file to save space
          rm "$file"
          # List generated parts
          ls -lh
          cd ..

      - name: Upload all parts as artifact
        uses: actions/upload-artifact@v4
        with:
          name: split-parts-90mb
          path: downloads/
          if-no-files-found: error
