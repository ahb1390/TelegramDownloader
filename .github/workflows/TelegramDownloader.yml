name: Download File from Telegram

on:
  workflow_dispatch:  # Allows you to run this workflow manually from the Actions tab
    inputs:
      message_link:
        description: 'Link to the Telegram message'
        required: true
        default: 'https://t.me/pypackeges/456'
      download_path:
        description: 'Path to save the downloaded file (e.g., ./downloads/)'
        required: true
        default: './downloads/'

jobs:
  download-telegram-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (for potential local scripts)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install python-telegram-bot
        run: pip install python-telegram-bot

      - name: Create download directory
        run: mkdir -p ${{ github.event.inputs.download_path }}

      - name: Run Downloader Script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          MESSAGE_LINK: ${{ github.event.inputs.message_link }}
          DOWNLOAD_DIR: ${{ github.event.inputs.download_path }}
        run: |
          python - <<EOF
          import os
          import asyncio
          from telegram import Bot
          from telegram.ext import Application
          from telethon import TelegramClient
          from telethon.tl.functions.messages import GetMessagesRequest
          from telethon.tl.types import InputMessageID
          import urllib.parse
          import aiohttp
          import aiofiles
          
          async def download_file_from_link(bot_token, api_id, api_hash, message_link, download_dir):
              # Parse the message link
              parsed_url = urllib.parse.urlparse(message_link)
              path_parts = parsed_url.path.split('/')
              if len(path_parts) < 3:
                  print("Invalid message link format.")
                  return False
              chat_username = path_parts[1]
              message_id = int(path_parts[2])
          
              # Using Telethon to get file info
              async with TelegramClient('anon', api_id, api_hash) as client:
                  await client.start(bot_token=bot_token)
                  entity = await client.get_entity(chat_username)
                  message = await client.get_messages(entity, ids=message_id)
          
                  if message and message.document:
                      file_name = getattr(message.document.attributes[0], 'file_name', f"file_{message_id}.bin")
                      file_path = os.path.join(download_dir, file_name)
          
                      # Download the file using Telethon
                      await client.download_media(message, file=file_path)
                      print(f"File downloaded successfully: {file_path}")
                      return True
                  else:
                      print("No document found in the message.")
                      return False
          
          # Run the async function
          success = asyncio.run(download_file_from_link(
              bot_token=os.environ['BOT_TOKEN'],
              api_id=int(os.environ['API_ID']),
              api_hash=os.environ['API_HASH'],
              message_link=os.environ['MESSAGE_LINK'],
              download_dir=os.environ['DOWNLOAD_DIR']
          ))
          
          if not success:
              exit(1)
          EOF

      - name: Upload Download Artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-files
          path: ${{ github.event.inputs.download_path }}
